<h2>Cadastrar Novo Usuário</h2>
{% if messages %}
  {% for message in messages %}
    <div 
        class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}" 
        role="alert"
        style="margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"
    >
        {{ message }}
    </div>
  {% endfor %}
{% endif %}

<form method="post">
 {% csrf_token %}
  {{ form.as_p }}

  <button type="submit">Cadastrar</button>
</form>

<a href="{% url 'listar_usuarios' %}">Voltar à listagem</a>
